     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg17" />
  <!-- A simple house shape made of line segments -->
  <defs>
    <!-- A horizontal beam -->
    <line
       id="beam"
       x1="0"
       y1="0"
       x2="80"
       y2="0"
       style="fill:#000000;stroke:#000000;stroke-opacity:1" />
    <!-- A vertical wall -->
    <line
       id="wall"
       x1="0"
       y1="0"
       x2="0"
       y2="80"
       style="fill:#000000;stroke:#000000;stroke-opacity:1" />
  </defs>
  <!-- Walls -->
  <use
     href="#wall"
     x="40" y="60"
     id="use1" />

  <use
     href="#wall"
     x="120" y="60"
     id="use2" />
  <!-- Roof -->
  <line
     x1="30"
     y1="60"
     x2="80"
     y2="20"
     id="line9"
     style="fill:#000000;stroke:#000000;stroke-opacity:1" />
  <line
     x1="80"
     y1="20"
     x2="130"
     y2="60"
     id="line11"
     style="fill:#000000;stroke:#000000;stroke-opacity:1" />
  <!-- Floor and ceiling as reused beams -->
  <use
     href="#beam"
     x="40" y="60"
     id="use3" />
  <use
     href="#beam"
     x="40" y="140"
     id="use4" />

</svg>
