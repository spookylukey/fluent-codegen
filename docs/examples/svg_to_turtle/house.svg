<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- A simple house shape made of line segments -->
  <defs>
    <!-- A horizontal beam -->
    <line id="beam" x1="0" y1="0" x2="80" y2="0"/>
  </defs>

  <!-- Walls -->
  <line x1="40" y1="60" x2="40" y2="140"/>   <!-- left wall -->
  <line x1="120" y1="60" x2="120" y2="140"/> <!-- right wall -->

  <!-- Roof -->
  <line x1="30" y1="60" x2="80" y2="20"/>    <!-- left roof -->
  <line x1="80" y1="20" x2="130" y2="60"/>   <!-- right roof -->

  <!-- Floor and ceiling as reused beams -->
  <use href="#beam" transform="translate(40, 60)"/>   <!-- ceiling -->
  <use href="#beam" transform="translate(40, 140)"/>  <!-- floor -->
</svg>
